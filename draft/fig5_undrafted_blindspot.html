<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 5: The Undrafted Blind Spot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.35.0/plotly.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #090c11; font-family: 'DM Sans', sans-serif; color: #c9cfd8; }
  #chart { width: 100%; max-width: 800px; margin: 0 auto; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
var labels = ['Any NHL Game','100+ GP','200+ GP','400+ GP'];
var draftedOnly = [0.741,0.757,0.760,0.777];
var withUndrafted = [0.626,0.655,0.673,0.714];
var isMobile = window.innerWidth < 600;
var trace1 = {
  x: labels, y: draftedOnly, name: 'Drafted Players Only', type: 'bar',
  marker: { color: '#00d4ff', opacity: 0.85 },
  text: draftedOnly.map(function(v){return v.toFixed(3);}),
  textposition: 'outside', textfont: { size: isMobile ? 9 : 11, color: '#00d4ff' },
  hovertemplate: '<b>%{x}</b><br>AUC (drafted only): %{y:.3f}<extra></extra>'
};
var trace2 = {
  x: labels, y: withUndrafted, name: 'Including Undrafted NHLers', type: 'bar',
  marker: { color: '#ef4444', opacity: 0.85 },
  text: withUndrafted.map(function(v){return v.toFixed(3);}),
  textposition: 'outside', textfont: { size: isMobile ? 9 : 11, color: '#ef4444' },
  hovertemplate: '<b>%{x}</b><br>AUC (with undrafted): %{y:.3f}<extra></extra>'
};
var dropAnnotations = [];
for (var i = 0; i < labels.length; i++) {
  var drop = (draftedOnly[i] - withUndrafted[i]).toFixed(3);
  dropAnnotations.push({ x: i, y: (draftedOnly[i]+withUndrafted[i])/2, text: '<b>\u2193 '+drop+'</b>', showarrow: false, font: { size: isMobile ? 10 : 13, color: '#f4a940' } });
}
var layout = {
  paper_bgcolor: '#090c11', plot_bgcolor: '#0f1219',
  font: { family: 'DM Sans, sans-serif', color: '#c9cfd8', size: isMobile ? 10 : 12 },
  title: { text: 'The Undrafted Blind Spot', font: { size: isMobile ? 13 : 17, color: '#eef1f5' }, y: 0.98 },
  barmode: 'group',
  xaxis: { tickfont: { size: isMobile ? 9 : 11 }, gridcolor: '#1c2333' },
  yaxis: { title: 'AUC', range: [0.5,0.85], gridcolor: '#1c2333', tickfont: { size: isMobile ? 9 : 11 } },
  legend: { x: isMobile ? 0.0 : 0.5, y: isMobile ? 1.12 : 0.98, bgcolor: 'rgba(15,18,25,0.9)', bordercolor: '#1c2333', borderwidth: 1, font: { size: isMobile ? 9 : 11 }, orientation: isMobile ? 'h' : 'v' },
  margin: { l: isMobile ? 40 : 55, r: isMobile ? 10 : 20, t: isMobile ? 55 : 50, b: isMobile ? 50 : 40 },
  annotations: dropAnnotations,
  shapes: [{ type:'line', x0:-0.5, x1:3.5, y0:0.5, y1:0.5, line:{color:'#333',width:1,dash:'dot'} }]
};
Plotly.newPlot('chart', [trace1, trace2], layout, { responsive: true, displayModeBar: false });
</script>
</body>
</html>
